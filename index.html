<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sadece Senin İçin... 🤍</title>
    <style>
        :root {
            /* Seksi ve Tatlı Koyu Pembe Paleti */
            --primary-pink: #ff4757;
            --dark-pink: #e84393;
            --deep-rose: #c0392b;
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-color: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            /* Koyu Pembe Gradyan Arka Plan */
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #e84393 100%);
            color: var(--text-color);
            text-align: center;
            overflow-x: hidden;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            min-height: 100vh;
        }

        /* Arka Plan Kalpler */
        .heart-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .heart { position: absolute; animation: fall linear forwards; opacity: 0.8; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* Cam Efektli Kapsayıcı */
        .screen {
            display: none; z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px 25px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 45px rgba(232, 67, 147, 0.3);
            width: 85%; max-width: 350px;
            transition: all 0.5s ease;
            color: #fff;
        }
        .active { display: block; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .pulsate {
            font-size: 1.8rem; font-weight: 800;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            animation: pulse 2s infinite;
            margin-bottom: 25px;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .rose-btn { font-size: 5rem; cursor: pointer; background: none; border: none; transition: 0.4s; }
        .rose-btn:hover { transform: scale(1.2); }

        /* Kartlar ve Butonlar */
        h2 { font-weight: 700; font-size: 1.5rem; margin-bottom: 20px; }
        .option-btn {
            display: block; width: 100%; padding: 18px; margin: 12px 0;
            background: rgba(255, 255, 255, 0.9);
            color: var(--dark-pink);
            border: none; border-radius: 18px;
            font-size: 1.1rem; font-weight: 600;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .bags-container { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .bag-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px; padding: 12px;
            display: flex; align-items: center;
            transition: 0.3s;
        }
        .bag-card:active { transform: scale(0.95); }
        .bag-img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; margin-right: 15px; }
        .bag-name { color: var(--dark-pink); font-weight: 700; font-size: 1.2rem; }

        /* Renk Versiyonları */
        .color-variants { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .color-card {
            background: #fff; border-radius: 20px; padding: 10px;
            display: flex; align-items: center; border: 3px solid transparent;
        }
        .color-card.selected { border-color: var(--primary-pink); }
    </style>
</head>
<body>

    <div id="heart-bg" class="heart-bg"></div>

    <div id="screen-intro" class="screen active">
        <div class="pulsate">Seni kırdım galiba... 🥺</div>
        <p style="font-weight: 500;">Tarzını ne kadar iyi tanıyorum test edelim mi?</p>
        <button class="rose-btn" onclick="nextScreen('screen-quiz')">🌹</button>
    </div>

    <div id="screen-quiz" class="screen">
        <h2 id="q-text">Hazır mısın?</h2>
        <div id="options">
            <button class="option-btn" onclick="loadQ()">Evet, Başlayalım ✨</button>
        </div>
    </div>

    <div id="screen-bags" class="screen">
        <h2>Favori Modelin? 🤔</h2>
        <div class="bags-container">
            <div class="bag-card" onclick="selectBag(1)">
                <img src="canta1.png" class="bag-img">
                <span class="bag-name">Zarif Seri</span>
            </div>
            <div class="bag-card" onclick="selectBag(2)">
                <img src="canta2.png" class="bag-img">
                <span class="bag-name">Modern Seri</span>
            </div>
            <div class="bag-card" onclick="selectBag(3)">
                <img src="canta3.png" class="bag-img">
                <span class="bag-name">Klasik Seri</span>
            </div>
        </div>
    </div>

    <div id="screen-colors" class="screen">
        <h2>Hangi Renk Seni Yansıtır? 🎨</h2>
        <div id="color-list" class="color-variants"></div>
    </div>

    <div id="screen-result" class="screen">
        <div style="font-size: 4rem;">💖</div>
        <h2>Zevkine Bayıldım!</h2>
        <p id="final-choice" style="font-weight: 600;"></p>
        <p>Tarzın tam beklediğim gibi muhteşem. Seni her halinle çok seviyorum! ❤️</p>
    </div>

    <script>
        let selectedBagId = 0;
        const colors = ["bordo", "siyah", "kahverengi"];

        function nextScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function selectBag(id) {
            selectedBagId = id;
            const container = document.getElementById('color-list');
            container.innerHTML = '';
            
            colors.forEach(color => {
                const imgPath = `canta${id}_${color}.png`;
                container.innerHTML += `
                    <div class="bag-card" onclick="finish('${color}')">
                        <img src="${imgPath}" class="bag-img" onerror="this.src='https://via.placeholder.com/80/e84393/ffffff?text=${color}'">
                        <span class="bag-name" style="text-transform: capitalize;">${color}</span>
                    </div>
                `;
            });
            nextScreen('screen-colors');
        }

        function finish(color) {
            document.getElementById('final-choice').innerText = `Seçimin: ${color} versiyon!`;
            nextScreen('screen-result');
        }

        // Kalp Animasyonu
        setInterval(() => {
            const h = document.createElement("div");
            h.classList.add("heart");
            h.innerHTML = "💗";
            h.style.left = Math.random() * 100 + "vw";
            h.style.animationDuration = (Math.random() * 3 + 3) + "s";
            document.getElementById('heart-bg').appendChild(h);
            setTimeout(() => h.remove(), 6000);
        }, 400);

        // Basit Soru Mantığı
        let qIdx = 0;
        const qs = ["En sevdiğin renk koyu tonlar mıdır?", "Şıklık senin için her şeyden önce mi gelir?", "Sürprizleri sever misin?"];
        function loadQ() {
            if(qIdx < qs.length) {
                document.getElementById('q-text').innerText = qs[qIdx++];
                document.getElementById('options').innerHTML = `
                    <button class="option-btn" onclick="loadQ()">Kesinlikle</button>
                    <button class="option-btn" onclick="loadQ()">Bazen</button>
                `;
            } else { nextScreen('screen-bags'); }
        }
    </script>
</body>
</html>
